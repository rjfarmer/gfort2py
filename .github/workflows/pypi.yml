name: Publish to pypi
on: [push]
permissions: {}

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfort2py
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Python 
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: 3.11

    - uses: fortran-lang/setup-fortran@2a1b9c55897d827a9dfeb114408f3615e53b2b72 # v1
      id: setup-fortran
      with:
        compiler: gcc
        version: 13

    - name: Install dependices
      run: |
        sudo apt-get install gfortran-12
        python -m pip install build wheel pytest
        
    - name: Build a binary wheel and a source tarball
      run: >-
        python3 -m
        build
        --sdist
        --wheel
        --outdir dist/
        .
    - name: Test
      run: |
        python -m pip install dist/gfort2py*.tar.gz
        python -m pytest
        python -c "import gfort2py; print(gfort2py.__version__)"


    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
