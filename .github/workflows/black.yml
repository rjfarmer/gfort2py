name: Lint

on: [push, pull_request]
permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: psf/black@stable
        with:
            options: "--check --verbose"