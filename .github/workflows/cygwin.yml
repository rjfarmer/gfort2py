
name: Test on Cygwin 
on: [push, pull_request]
permissions: {}

jobs:
  cygwin:
    runs-on: windows-latest
    steps:
        - run: git config --global core.autocrlf input

        - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
          with:
            persist-credentials: false

        - name: Install Cygwin
          uses: cygwin/cygwin-install-action@711d29f3da23c9f4a1798e369a6f01198c13b11a # v6
          with:
            platform: x86_64
            install-dir: 'C:\tools\cygwin'
            packages: >-
              python312-devel python312-pip python-pip-wheel python-setuptools-wheel
              liblapack-devel liblapack0 gcc-fortran git dash ninja automake make gcc-g++ python3-numpy

        - name: pip cache
          uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
          with:
            path: 'C:\tools\cygwin\home\runneradmin\.local'
            key: ${{ runner.os }}-${{ hashFiles('pyproject.toml') }} 
                
        - name: Set Windows PATH
          uses: egor-tensin/cleanup-path@8cbbf6af9f8cf1d347258e3f6b850622e480d16d # v5.0.1
          with:
            dirs: 'C:\tools\cygwin\bin;C:\tools\cygwin\lib\lapack'
        - name: Verify that bash is Cygwin bash
          run: |
            command bash
            bash -c "uname -svrmo"
        - name: Tell Cygwin's git about this repository.
          run: |
            dash -c "which git; /usr/bin/git config --system --add safe.directory /cygdrive/d/a/gfort2py/gfort2py"        
        - name: Verify python version
          # Make sure it's the Cygwin one, not a Windows one
          run: |
            dash -c "which python3.12; /usr/bin/python3.12 --version -V"    
        - name: Install dependencies
          shell: "C:\\tools\\cygwin\\bin\\bash.exe -o igncr -eo pipefail {0}"
          run: |
            /usr/bin/python3.12 -m pip install --upgrade pip
            /usr/bin/python3.12 -m pip install --upgrade --user build wheel 
            /usr/bin/python3.12 -m pip install --upgrade --user pytest dataclasses_json platformdirs importlib_metadata gfModParser
            cygpath -w $(/usr/bin/python3.12 -c 'import dataclasses_json;print(dataclasses_json.__file__)')
        - name: Install 
          shell: "C:\\tools\\cygwin\\bin\\bash.exe -o igncr -eo pipefail {0}"
          run: |
            /usr/bin/python3.12 -m pip install .
        - name: Run tests
          shell: "C:\\tools\\cygwin\\bin\\bash.exe -o igncr -eo pipefail {0}"
          run: |
              export FC=$(which gfortran)
              /usr/bin/python3.12 -m pytest -v

